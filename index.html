<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <title>Temu Hesaplama</title>
  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: white;
      text-align: center;
      padding: 40px;
    }
    .box {
      background: #1e293b;
      padding: 30px;
      border-radius: 15px;
      max-width: 400px;
      margin: auto;
    }
    input {
      width: 100%;
      padding: 10px;
      margin: 10px 0;
      border-radius: 8px;
      border: none;
    }
    button {
      padding: 12px;
      width: 100%;
      background: #22c55e;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      cursor: pointer;
    }
    h1 {
      margin-bottom: 20px;
    }
    .result {
      margin-top: 20px;
      font-size: 20px;
      color: #4ade80;
    }
  </style>
</head>

<body>

  <div class="box">
    <h1>Temu Kar Hesaplama</h1>

    <input type="number" id="maliyet" placeholder="Ürün Maliyeti (₺)">
    <input type="number" id="satis" placeholder="Satış Fiyatı (₺)">
    <input type="number" id="kargo" placeholder="Kargo (₺)">
    
    <button onclick="hesapla()">Hesapla</button>

    <div class="result" id="sonuc"></div>
  </div>

  <script>
    function hesapla() {
      let maliyet = Number(document.getElementById("maliyet").value);
      let satis = Number(document.getElementById("satis").value);
      let kargo = Number(document.getElementById("kargo").value);

      let komisyon = satis * 0.20;
      let net = satis - maliyet - kargo - komisyon;

      document.getElementById("sonuc").innerHTML =
        "Net Kar: " + net.toFixed(2) + " ₺";
    }
  </script>

</body>
</html>
